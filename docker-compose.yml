services:
  mailprobe:
    image: ${MAILPROBE_IMAGE:-ghcr.io/brightcolor/mailprobev2:latest}
    pull_policy: always
    container_name: mailprobe
    env_file:
      - .env
    ports:
      - "${HTTP_PORT:-9090}:8080"
      - "${SMTP_PORT:-25}:2525"
    environment:
      # Tell the binary where to find the mounted .env so it can auto-append
      # new variables on every container start (e.g. after a Watchtower pull).
      - ENV_FILE=/config/.env
    volumes:
      - ./data:/data
      # Mount the .env file read-write so the binary can append missing variables.
      - ./.env:/config/.env:rw
      # Mount certificates only when ENABLE_TLS=true, then set TLS_CERT_FILE/TLS_KEY_FILE in .env.
      # - ./certs:/certs:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    mem_limit: 512m
    cpus: 0.50
